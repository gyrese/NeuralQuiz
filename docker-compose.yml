version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    image: neural-quiz-app:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Pas de valeur par défaut : le conteneur refuse de démarrer si ces secrets
      # ne sont pas fournis (voir .env / validation fail-fast dans server/index.js)
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD requis dans .env}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET requis dans .env}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    volumes:
      - quiz_data:/app/server/data
      - quiz_uploads:/app/server/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-your-email@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  quiz_data:
  quiz_uploads:
  caddy_data:
  caddy_config:
